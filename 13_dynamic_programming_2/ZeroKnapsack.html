<body>
<h1>Zero-One Knapsack / 0-1 배낭 문제</h1>
<p class="sub">제공하신 C++ 코드의 재귀 호출과 Bottom-Up 테이블 채우기를 비교합니다. 예시는 <code>values = {6, 5, 3}</code>, <code>weights = {3, 2, 1}</code>, <code>W = 5</code>입니다.</p>

<div id="tabs"></div>
<div id="step-counter"></div>
<div id="step-desc"></div>
<div id="legend"></div>

<div id="main-content">
  <div id="left-panel">
    <div class="sbox" id="items-box">
      <div class="slabel">Items / 아이템 목록</div>
      <div id="items-view"></div>
    </div>
    <div class="sbox" id="primary-box">
      <div class="slabel" id="primary-title"></div>
      <div id="primary-view"></div>
    </div>
    <div class="sbox" id="secondary-box">
      <div class="slabel" id="secondary-title"></div>
      <div id="secondary-view"></div>
    </div>
  </div>

  <div id="right-panel">
    <div class="sbox" id="runtime-box">
      <div class="slabel">Runtime State / 실행 상태</div>
      <div class="meta-grid" id="runtime-view">
        <div class="meta-card"><div class="meta-name" id="meta-a-name"></div><div class="meta-value" id="meta-a-val"></div><div class="meta-sub" id="meta-a-sub"></div></div>
        <div class="meta-card"><div class="meta-name" id="meta-b-name"></div><div class="meta-value" id="meta-b-val"></div><div class="meta-sub" id="meta-b-sub"></div></div>
        <div class="meta-card"><div class="meta-name" id="meta-c-name"></div><div class="meta-value" id="meta-c-val"></div><div class="meta-sub" id="meta-c-sub"></div></div>
        <div class="meta-card"><div class="meta-name" id="meta-d-name"></div><div class="meta-value" id="meta-d-val"></div><div class="meta-sub" id="meta-d-sub"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="code-panel">
  <div id="code-title"></div>
  <div id="code-body"></div>
</div>

<div id="nav">
  <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="button-row">
    <button class="nbtn" id="reset" type="button">Home</button>
    <button class="nbtn" id="prev" type="button">Prev</button>
    <button class="nbtn" id="auto-btn" type="button">Play</button>
    <button class="nbtn" id="next" type="button">Next</button>
    <button class="nbtn" id="last" type="button">End</button>
  </div>
</div>

<script>
(function () {
  const values = [6, 5, 3];
  const weights = [3, 2, 1];
  const WMAX = 5;
  const N = weights.length;
  const modes = ['bottom', 'recur'];
  let mode = 'bottom';
  let current = 0;
  let timer = null;

  const refs = {
    tabs: document.getElementById('tabs'),
    counter: document.getElementById('step-counter'),
    desc: document.getElementById('step-desc'),
    legend: document.getElementById('legend'),
    items: document.getElementById('items-view'),
    runtime: document.getElementById('runtime-view'),
    primaryTitle: document.getElementById('primary-title'),
    primaryView: document.getElementById('primary-view'),
    secondaryBox: document.getElementById('secondary-box'),
    secondaryTitle: document.getElementById('secondary-title'),
    secondaryView: document.getElementById('secondary-view'),
    codeTitle: document.getElementById('code-title'),
    codeBody: document.getElementById('code-body'),
    progress: document.getElementById('progress-bar'),
    reset: document.getElementById('reset'),
    prev: document.getElementById('prev'),
    next: document.getElementById('next'),
    last: document.getElementById('last'),
    auto: document.getElementById('auto-btn'),
    metaAName: document.getElementById('meta-a-name'),
    metaAVal: document.getElementById('meta-a-val'),
    metaASub: document.getElementById('meta-a-sub'),
    metaBName: document.getElementById('meta-b-name'),
    metaBVal: document.getElementById('meta-b-val'),
    metaBSub: document.getElementById('meta-b-sub'),
    metaCName: document.getElementById('meta-c-name'),
    metaCVal: document.getElementById('meta-c-val'),
    metaCSub: document.getElementById('meta-c-sub'),
    metaDName: document.getElementById('meta-d-name'),
    metaDVal: document.getElementById('meta-d-val'),
    metaDSub: document.getElementById('meta-d-sub')
  };

  const code = {
    recur: {
      title: 'int RecurZeroOneKnapsack(const vector<int>& weights, const vector<int>& values, int W, int n)',
      lines: [
        { indent: 0, text: 'int RecurZeroOneKnapsack(weights, values, W, n)' },
        { indent: 0, text: '{' },
        { indent: 1, text: 'if (n == 0 || W == 0) return 0;' },
        { indent: 1, text: 'if (W < weights[n - 1]) {' },
        { indent: 2, text: 'return RecurZeroOneKnapsack(weights, values, W, n - 1);' },
        { indent: 1, text: '} else {' },
        { indent: 2, text: 'return max(' },
        { indent: 3, text: 'RecurZeroOneKnapsack(weights, values, W, n - 1),' },
        { indent: 3, text: 'RecurZeroOneKnapsack(weights, values, W - weights[n - 1], n - 1) + values[n - 1]' },
        { indent: 2, text: ');' },
        { indent: 1, text: '}' },
        { indent: 0, text: '}' }
      ]
    },
    bottom: {
      title: 'int ZeroOneKnapsack(vector<int> weights, vector<int> values, int W)',
      lines: [
        { indent: 0, text: 'vector<vector<int>> table(W + 1, vector<int>(weights.size() + 1, 0));' },
        { indent: 0, text: 'vector<vector<vector<int>>> items(W + 1, vector<vector<int>>(weights.size() + 1, vector<int>(weights.size(), 0)));' },
        { indent: 0, text: 'for (int w = 1; w <= W; w++) {' },
        { indent: 1, text: 'for (int n = 1; n <= weights.size(); n++) {' },
        { indent: 2, text: 'if (w < weights[n - 1]) {' },
        { indent: 3, text: 'table[w][n] = table[w][n - 1];' },
        { indent: 3, text: 'items[w][n] = items[w][n - 1];' },
        { indent: 2, text: '} else {' },
        { indent: 3, text: 'if (table[w][n - 1] > table[w - weights[n - 1]][n - 1] + values[n - 1]) {' },
        { indent: 4, text: 'table[w][n] = table[w][n - 1];' },
        { indent: 4, text: 'items[w][n] = items[w][n - 1];' },
        { indent: 3, text: '} else {' },
        { indent: 4, text: 'table[w][n] = table[w - weights[n - 1]][n - 1] + values[n - 1];' },
        { indent: 4, text: 'items[w][n] = items[w - weights[n - 1]][n - 1];' },
        { indent: 4, text: 'items[w][n][n - 1] += 1;' },
        { indent: 3, text: '}' },
        { indent: 2, text: '}' },
        { indent: 1, text: '}' },
        { indent: 0, text: '}' }
      ]
    }
  };

  function esc(value) {
    return String(value).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  function clone2(matrix) {
    return matrix.map((row) => row.slice());
  }

  function clone3(cube) {
    return cube.map((layer) => layer.map((row) => row.slice()));
  }

  function zeroItems() {
    return Array.from({ length: WMAX + 1 }, () => Array.from({ length: N + 1 }, () => Array(N).fill(0)));
  }

  function itemBits(bits) {
    return bits.join('');
  }

  function itemValue(bits) {
    return bits.reduce((sum, bit, index) => sum + bit * values[index], 0);
  }

  function itemWeight(bits) {
    return bits.reduce((sum, bit, index) => sum + bit * weights[index], 0);
  }

  function makeRecursiveSteps() {
    const steps = [];
    const stack = [];
    const trace = [];
    const treeNodes = new Map();
    let rootId = null;
    let nextId = 1;

    function addTrace(text, currentLine = true) {
      trace.push({ text, current: currentLine });
      if (trace.length > 10) trace.shift();
    }

    function snapshotTree(currentId) {
      return {
        rootId,
        currentId,
        nodes: Array.from(treeNodes.values()).map((node) => ({
          ...node,
          children: node.children.slice()
        }))
      };
    }

    function pushStep(data, currentId = stack.length ? stack[stack.length - 1].id : null) {
      const topFrame = stack.length ? stack[stack.length - 1] : null;
      steps.push({
        mode: 'recur',
        branch: topFrame ? topFrame.branch : null,
        stack: stack.map((frame) => ({ ...frame })),
        trace: trace.map((line) => ({ ...line })),
        tree: snapshotTree(currentId),
        ...data
      });
    }

    function recur(capacity, n, branch, parentId = null) {
      const id = nextId;
      nextId += 1;
      const node = {
        id,
        parentId,
        capacity,
        n,
        branch,
        status: 'current',
        decision: '호출 진입',
        result: null,
        skip: null,
        take: null,
        children: []
      };
      treeNodes.set(id, node);
      if (parentId === null) {
        rootId = id;
      } else {
        treeNodes.get(parentId).children.push(id);
      }
      stack.push({ id, capacity, n, branch, phase: 'enter' });
      addTrace(`#${id} 호출: W=${capacity}, n=${n}`);
      pushStep({
        W: capacity, n, item: n, lines: [1, 2],
        desc: `재귀 호출 #${id}: 남은 용량 W=${capacity}, 고려 아이템 수 n=${n}입니다.`,
        formula: `<code>RecurZeroOneKnapsack(W=${capacity}, n=${n})</code>`,
        decision: '호출 진입', result: ''
      });

      if (n === 0 || capacity === 0) {
        node.status = 'returned';
        node.decision = 'base case';
        node.result = 0;
        stack[stack.length - 1].phase = 'return';
        addTrace(`#${id} base case → 0`);
        pushStep({
          W: capacity, n, item: n, lines: [3],
          desc: '아이템이 없거나 용량이 0이면 담을 수 있는 가치는 0입니다.',
          formula: '<code>n == 0 || W == 0</code>',
          decision: 'base case', result: 0
        });
        stack.pop();
        return 0;
      }

      const weight = weights[n - 1];
      const value = values[n - 1];
      if (capacity < weight) {
        node.status = 'blocked';
        node.decision = '용량 부족';
        stack[stack.length - 1].phase = 'too-heavy';
        addTrace(`#${id} item ${n}은 무거워서 제외`);
        pushStep({
          W: capacity, n, item: n, lines: [4, 5],
          desc: `아이템 ${n}의 무게 ${weight}가 현재 용량 ${capacity}보다 커서 넣을 수 없습니다.`,
          formula: `<code>${capacity} < weights[${n - 1}] (${weight})</code>`,
          decision: '용량 부족', result: ''
        });
        const result = recur(capacity, n - 1, 'skip-only', id);
        node.status = 'returned';
        node.decision = '제외 반환';
        node.result = result;
        stack[stack.length - 1].phase = 'return';
        addTrace(`#${id} 반환: ${result}`);
        pushStep({
          W: capacity, n, item: n, lines: [5],
          desc: `아이템 ${n}을 제외한 결과 ${result}를 그대로 반환합니다.`,
          formula: `<code>return ${result}</code>`,
          decision: '제외 반환', result
        });
        stack.pop();
        return result;
      }

      node.status = 'branching';
      node.decision = '제외 분기 계산';
      stack[stack.length - 1].phase = 'skip';
      addTrace(`#${id} 제외 분기 계산`);
      pushStep({
        W: capacity, n, item: n, lines: [6, 7, 8],
        desc: `아이템 ${n}을 넣지 않는 경우를 먼저 계산합니다.`,
        formula: `<code>skip = Recur(W=${capacity}, n=${n - 1})</code>`,
        decision: '제외 분기', result: ''
      });
      const skip = recur(capacity, n - 1, 'skip', id);
      node.skip = skip;

      node.status = 'branching';
      node.decision = '포함 분기 계산';
      stack[stack.length - 1].phase = 'take';
      addTrace(`#${id} 포함 분기 계산`);
      pushStep({
        W: capacity, n, item: n, lines: [9],
        desc: `아이템 ${n}을 넣는 경우입니다. 용량 ${weight}를 사용하고 가치 ${value}를 더합니다.`,
        formula: `<code>take = Recur(W=${capacity - weight}, n=${n - 1}) + ${value}</code>`,
        decision: '포함 분기', result: '', skip
      });
      const take = recur(capacity - weight, n - 1, 'take', id) + value;
      node.take = take;

      const result = Math.max(skip, take);
      node.status = 'returned';
      node.decision = take >= skip ? '포함 선택' : '제외 선택';
      node.result = result;
      stack[stack.length - 1].phase = 'return';
      addTrace(`#${id} max(${skip}, ${take}) → ${result}`);
      pushStep({
        W: capacity, n, item: n, lines: [7, 8, 9, 10],
        desc: `넣지 않는 값 ${skip}와 넣는 값 ${take} 중 더 큰 값을 선택합니다.`,
        formula: `<code>max(${skip}, ${take}) = ${result}</code>`,
        decision: take >= skip ? '포함 선택' : '제외 선택', result, skip, take
      });
      stack.pop();
      return result;
    }

    const finalResult = recur(WMAX, N, 'root');
    pushStep({
      W: WMAX, n: N, item: 0, lines: [],
      desc: `재귀 계산이 완료되었습니다. 최대 가치는 ${finalResult}입니다.`,
      formula: `<code>return ${finalResult}</code>`,
      decision: '완료', result: finalResult
    });
    return steps;
  }

  function makeBottomSteps() {
    const steps = [];
    const table = Array.from({ length: WMAX + 1 }, () => Array(N + 1).fill(0));
    const items = zeroItems();

    function pushStep(data) {
      steps.push({ mode: 'bottom', ...data });
    }

    pushStep({
      w: 0, n: 0, item: 0, source: 'init', value: 0, bits: Array(N).fill(0), lines: [1, 2],
      desc: 'table과 items를 0으로 초기화합니다. w=0 또는 n=0인 base row/column은 모두 0입니다.',
      formula: '<code>table[*][0] = table[0][*] = 0</code>',
      decision: '초기화'
    });

    for (let w = 1; w <= WMAX; w += 1) {
      pushStep({
        w, n: 0, item: 0, source: 'for-w', value: table[w][0], bits: items[w][0].slice(), lines: [3],
        desc: `바깥 for 루프가 용량 w=${w} 행으로 진입합니다.`,
        formula: `<code>for (int w = ${w}; w <= W; w++)</code>`,
        decision: 'w 루프 진입'
      });

      for (let n = 1; n <= N; n += 1) {
        const weight = weights[n - 1];
        const value = values[n - 1];
        pushStep({
          w, n, item: n, source: 'for-n', value: table[w][n], bits: items[w][n].slice(), lines: [4],
          desc: `안쪽 for 루프가 아이템 n=${n}을 고려합니다.`,
          formula: `<code>for (int n = ${n}; n <= weights.size(); n++)</code>`,
          decision: 'n 루프 진입'
        });

        if (w < weight) {
          table[w][n] = table[w][n - 1];
          items[w][n] = items[w][n - 1].slice();
          pushStep({
            w, n, item: n, source: 'too-heavy', value: table[w][n], bits: items[w][n].slice(), committed: true, lines: [5, 6, 7],
            desc: `용량 ${w}가 아이템 ${n}의 무게 ${weight}보다 작아 넣을 수 없습니다. 왼쪽 값을 복사합니다.`,
            formula: `<code>${w} < weights[${n - 1}] (${weight})</code>`,
            decision: '용량 부족'
          });
        } else {
          const skip = table[w][n - 1];
          const take = table[w - weight][n - 1] + value;
          pushStep({
            w, n, item: n, source: 'compare', value: table[w][n], bits: items[w][n].slice(), lines: [8, 9],
            desc: `아이템 ${n}을 넣지 않는 값 ${skip}와 넣는 값 ${take}를 비교합니다.`,
            formula: `<code>skip=${skip}, take=table[${w - weight}][${n - 1}] + ${value} = ${take}</code>`,
            decision: '두 경우 비교', skip, take
          });

          if (skip > take) {
            table[w][n] = skip;
            items[w][n] = items[w][n - 1].slice();
            pushStep({
              w, n, item: n, source: 'skip', value: table[w][n], bits: items[w][n].slice(), committed: true, lines: [10, 11],
              desc: `넣지 않는 경우 ${skip}가 더 큽니다. table[${w}][${n - 1}]을 가져옵니다.`,
              formula: `<code>table[${w}][${n}] = table[${w}][${n - 1}]</code>`,
              decision: '제외 선택', skip, take
            });
          } else {
            table[w][n] = take;
            items[w][n] = items[w - weight][n - 1].slice();
            items[w][n][n - 1] += 1;
            pushStep({
              w, n, item: n, source: 'take', value: table[w][n], bits: items[w][n].slice(), committed: true, lines: [12, 13, 14, 15],
              desc: `넣는 경우 ${take}가 더 크거나 같습니다. 아이템 ${n}을 선택합니다.`,
              formula: `<code>table[${w}][${n}] = table[${w - weight}][${n - 1}] + ${value}</code>`,
              decision: '포함 선택', skip, take
            });
          }
        }
      }
    }

    pushStep({
      w: WMAX, n: N, item: 0, source: 'done', value: table[WMAX][N], bits: items[WMAX][N].slice(), lines: [],
      desc: `Bottom-Up 계산이 완료되었습니다. 최대 가치는 ${table[WMAX][N]}입니다.`,
      formula: `<code>return table[${WMAX}][${N}]</code>`,
      decision: '완료'
    });
    return steps;
  }

  const stepsByMode = {
    recur: makeRecursiveSteps(),
    bottom: makeBottomSteps()
  };
  let steps = stepsByMode[mode];

  function stateAt(stepIndex) {
    const table = Array.from({ length: WMAX + 1 }, () => Array(N + 1).fill(0));
    const items = zeroItems();
    const bottomSteps = stepsByMode.bottom;
    for (let index = 1; index <= stepIndex && index < bottomSteps.length - 1; index += 1) {
      const step = bottomSteps[index];
      if (!step.committed) continue;
      table[step.w][step.n] = step.value;
      items[step.w][step.n] = step.bits.slice();
    }
    return { table, items };
  }

  function renderItems(step) {
    refs.items.innerHTML = `<div class="item-table-wrap"><table class="item-table">
      <thead>
        <tr>
          <th>아이템</th>
          <th>무게</th>
          <th>가치</th>
        </tr>
      </thead>
      <tbody>${weights.map((weight, index) => {
      const itemNo = index + 1;
      const classes = [];
      if (step.item === itemNo) classes.push('active');
      if (step.bits && step.bits[index]) classes.push('take');
      return `<tr class="${classes.join(' ')}">
        <td class="item-name">Item ${itemNo}</td>
        <td>${weight}</td>
        <td>${values[index]}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
  }

  function cellClass(step, w, n, kind, value) {
    const classes = [];
    if (kind === 'table' && value === 0) classes.push('zero');
    if (step.w === w && step.n === n) classes.push('current');
    if (isSourceCell(step, w, n, kind)) classes.push('source');
    if (step.source === 'done' && w === WMAX && n === N) classes.push('result');
    return classes.join(' ');
  }

  function isSourceCell(step, w, n, kind) {
    if (!step || step.item <= 0) return false;
    const skipSource = step.w === w && step.n - 1 === n;
    const takeSource = step.w - weights[step.item - 1] === w && step.n - 1 === n;

    if (kind === 'table') {
      if (step.source === 'compare') return skipSource || takeSource;
      if (step.source === 'skip' || step.source === 'take') return skipSource || takeSource;
      if (step.source === 'too-heavy') return skipSource;
    }

    if (kind === 'items') {
      if (step.source === 'compare') return skipSource || takeSource;
      if (step.source === 'skip' || step.source === 'take') return skipSource || takeSource;
      if (step.source === 'too-heavy') return skipSource;
    }

    return false;
  }

  function isTakeSourceCell(step, w, n) {
    return !!step
      && step.item > 0
      && (step.source === 'compare' || step.source === 'skip' || step.source === 'take')
      && step.w - weights[step.item - 1] === w
      && step.n - 1 === n;
  }

  function renderTable(state, step, kind) {
    let html = `<div class="table-wrap"><table class="dp-table ${kind}-table" style="--cols:${N + 2}"><thead><tr><th>w\\n</th>`;
    for (let n = 0; n <= N; n += 1) {
      html += `<th>${n}${n > 0 ? `<span class="small">w${weights[n - 1]} v${values[n - 1]}</span>` : ''}</th>`;
    }
    html += '</tr></thead><tbody>';
    for (let w = 0; w <= WMAX; w += 1) {
      html += `<tr><th>${w}</th>`;
      for (let n = 0; n <= N; n += 1) {
        const value = kind === 'items' ? itemBits(state.items[w][n]) : state.table[w][n];
        const add = kind === 'table' && isTakeSourceCell(step, w, n)
          ? `<span class="add-badge">+${values[step.item - 1]}</span>`
          : '';
        html += `<td class="${cellClass(step, w, n, kind, value)}"><span class="cell-main">${esc(value)}</span>${add}</td>`;
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  function branchLabel(branch) {
    return {
      root: '시작',
      skip: '제외',
      take: '포함',
      'skip-only': '용량 부족 → 제외'
    }[branch] || branch || '-';
  }

  function renderTree(step) {
    const tree = step.tree || { rootId: null, currentId: null, nodes: [] };
    const byId = new Map(tree.nodes.map((node) => [node.id, node]));

    function renderNode(id) {
      const node = byId.get(id);
      if (!node) return '';
      const classes = ['tree-card'];
      if (node.id === tree.currentId) classes.push('current');
      if (node.status === 'branching') classes.push('branching');
      if (node.status === 'blocked') classes.push('blocked');
      if (node.status === 'returned') classes.push('returned');
      const compare = node.skip !== null && node.take !== null ? ` · skip ${node.skip}, take ${node.take}` : '';
      const children = node.children.map(renderNode).join('');
      return `<li>
        <div class="${classes.join(' ')}">
          <div class="tree-call">#${node.id}</div>
          <div class="tree-meta">W=${node.capacity}, n=${node.n}</div>
          <div class="tree-branch">${esc(branchLabel(node.branch))}</div>
          <div class="tree-decision">${esc(node.decision)}${compare}<span class="tree-result"> ${node.result !== null ? `→ ${node.result}` : ''}</span></div>
        </div>
        ${children ? `<ul>${children}</ul>` : ''}
      </li>`;
    }

    refs.primaryView.innerHTML = tree.rootId
      ? `<div class="call-tree-wrap"><ul class="call-tree">${renderNode(tree.rootId)}</ul></div>`
      : '<div class="trace-line">아직 생성된 호출이 없습니다.</div>';
  }

  function renderRecursiveDetails(step) {
    const stack = step.stack || [];
    const stackHtml = stack.length
      ? `<div class="stack-list">${stack.map((frame, index) => (
        `<div class="frame ${index === stack.length - 1 ? 'current' : ''}">
          <div class="frame-id">#${frame.id}</div>
          <div class="frame-main">W=${frame.capacity}, n=${frame.n}</div>
          <div class="frame-sub">${esc(frame.phase)}</div>
        </div>`
      )).join('')}</div>`
      : '<div class="trace-line">호출 스택이 비어 있습니다.</div>';
    const traceHtml = `<div class="trace-list">${(step.trace || []).map((line, index, arr) => (
      `<div class="trace-line ${index === arr.length - 1 || line.current ? 'current' : ''}">${esc(line.text)}</div>`
    )).join('')}</div>`;
    refs.secondaryView.innerHTML = `<div class="detail-split">
      <div><div class="detail-title">Call Stack</div>${stackHtml}</div>
      <div><div class="detail-title">Recent Trace</div>${traceHtml}</div>
    </div>`;
  }

  function renderBottom(step) {
    const state = stateAt(current);
    refs.primaryView.innerHTML = `<div class="dp-pair">
      <div class="dp-panel">
        <div class="dp-panel-title">table[w][n] / 최대 가치</div>
        ${renderTable(state, step, 'table')}
      </div>
      <div class="dp-panel">
        <div class="dp-panel-title">items[w][n] / 선택 벡터</div>
        ${renderTable(state, step, 'items')}
      </div>
    </div>`;
    refs.secondaryView.innerHTML = '';
  }

  function syntax(line) {
    return esc(line)
      .replace(/(&quot;.*?&quot;|&#39;.*?&#39;)/g, '<span class="str">$1</span>')
      .replace(/\b(vector|int|return|if|else|for|const)\b/g, '<span class="kw">$1</span>')
      .replace(/\b(RecurZeroOneKnapsack|ZeroOneKnapsack|max|size)\b/g, '<span class="fn">$1</span>')
      .replace(/\b(weights|values|table|items|W|n|w)\b/g, '<span class="id">$1</span>')
      .replace(/\b\d+\b/g, '<span class="num">$&</span>');
  }

  function renderCode(step) {
    const active = new Set(step.lines || []);
    refs.codeTitle.textContent = code[mode].title;
    refs.codeBody.innerHTML = code[mode].lines.map((line, index) => {
      const no = index + 1;
      return `<div class="cline ${active.has(no) ? 'hl' : ''}">
        <div class="lnum">${no}</div>
        <div class="lcode" style="--indent:${line.indent}">${syntax(line.text)}</div>
      </div>`;
    }).join('');
  }

  function renderMeta(step) {
    if (mode === 'recur') {
      refs.runtime.className = 'meta-grid';
      refs.runtime.innerHTML = [
        `<div class="meta-card"><div class="meta-name">Call</div><div class="meta-value">W=${step.W ?? '-'}, n=${step.n ?? '-'}</div><div class="meta-sub">recursive state</div></div>`,
        `<div class="meta-card"><div class="meta-name">Item</div><div class="meta-value">${step.item ? `#${step.item}` : '-'}</div><div class="meta-sub">${step.item ? `weight ${weights[step.item - 1]}, value ${values[step.item - 1]}` : 'none'}</div></div>`,
        `<div class="meta-card"><div class="meta-name">Decision</div><div class="meta-value">${esc(step.decision || '-')}</div><div class="meta-sub">${esc(step.source || step.branch || '-')}</div></div>`,
        `<div class="meta-card"><div class="meta-name">Value</div><div class="meta-value">${step.result ?? step.value ?? '-'}</div><div class="meta-sub">${step.take !== undefined ? `skip ${step.skip}, take ${step.take}` : 'current result'}</div></div>`
      ].join('');
      return;
    }

    const state = stateAt(current);
    const w = step.w ?? 0;
    const n = step.n ?? 0;
    const base = w === 0 || n === 0 || step.source === 'init';
    const itemWeightValue = n > 0 ? weights[n - 1] : null;
    const itemValueValue = n > 0 ? values[n - 1] : null;
    const heavy = !base && w < itemWeightValue;
    const canTake = !base && w >= itemWeightValue;
    const currentValue = state.table[w]?.[n] ?? step.value ?? 0;
    const skipValue = n > 0 ? state.table[w][n - 1] : 0;
    const takeBaseW = canTake ? w - itemWeightValue : null;
    const takeBaseValue = canTake ? state.table[takeBaseW][n - 1] : null;
    const takeValue = canTake ? (step.take ?? takeBaseValue + itemValueValue) : null;
    const chosen = step.source === 'skip' ? `K(${w}, ${n - 1})`
      : step.source === 'take' ? `K(${takeBaseW}, ${n - 1}) + ${itemValueValue}`
      : step.source === 'too-heavy' ? `K(${w}, ${n - 1})`
      : step.source === 'done' ? `K(${w}, ${n})`
      : '-';
    const resultValue = step.source === 'compare' || step.source === 'for-n' ? '-' : (step.value ?? currentValue);

    function status(active) {
      return active ? '<span class="case-status">현재 구간</span>' : '<span class="case-status">대상 아님</span>';
    }

    function sourceRow(kind, label, cell, value) {
      return `<div class="source-row ${kind}">
        <div class="source-label">${label}</div>
        <div class="source-cell">${cell}</div>
        <div class="source-value">${value}</div>
      </div>`;
    }

    refs.runtime.className = 'runtime-state';
    refs.runtime.innerHTML = `
      <div class="runtime-current">
        <div class="meta-name">Current Cell / 현재 셀</div>
        <div class="meta-value">table[${w}][${n}] = K(${w}, ${n})</div>
        <div class="meta-sub">판정: ${esc(step.decision || '-')} · 현재 값: ${resultValue}</div>
      </div>

      <div class="case-card ${base ? 'active' : ''}">
        <div class="case-title">1. 기저조건</div>
        <div class="case-desc">배낭 용량이 0이거나 고려할 아이템이 0개이면 가치는 0입니다.</div>
        <div class="case-formula">K(0, n) = 0, K(W, 0) = 0</div>
        ${status(base)}
        ${base ? `<div class="source-list">${sourceRow('result', '결과', `K(${w}, ${n})`, 0)}</div>` : ''}
      </div>

      <div class="case-card heavy ${heavy ? 'active' : ''}">
        <div class="case-title">2. 현재 아이템이 용량보다 무거운 경우</div>
        <div class="case-desc">n번째 아이템을 넣을 수 없으므로 현재 아이템을 제외한 값을 그대로 가져옵니다.</div>
        <div class="case-formula">if (W &lt; weights[n - 1]) &nbsp; K(W, n) = K(W, n - 1)</div>
        ${status(heavy)}
        ${heavy ? `<div class="source-list">${sourceRow('skip', '가져옴', `K(${w}, ${n - 1})`, skipValue)}</div>` : ''}
      </div>

      <div class="case-card can-take ${canTake ? 'active' : ''}">
        <div class="case-title">3. 현재 아이템을 넣을 수 있는 경우</div>
        <div class="case-desc">넣지 않는 경우와 넣는 경우를 비교해서 더 큰 값을 선택합니다.</div>
        <div class="case-formula">K(W, n) = max(K(W, n - 1), K(W - weights[n - 1], n - 1) + values[n - 1])</div>
        ${status(canTake)}
        ${canTake ? `<div class="source-list">
          ${sourceRow('skip', '3.1 제외', `K(${w}, ${n - 1})`, skipValue)}
          ${sourceRow('take', '3.2 포함', `K(${takeBaseW}, ${n - 1}) = ${takeBaseValue} + value ${itemValueValue}`, takeValue)}
          ${sourceRow('result', '선택', chosen, resultValue)}
        </div>` : ''}
      </div>`;
  }

  function renderLegend() {
    const items = [
      { label: '현재 셀/호출', fill: 'rgba(247,178,103,.16)', stroke: '#f7b267' },
      { label: '가져오는 값', fill: 'rgba(78,201,176,.16)', stroke: '#4ec9b0' },
      { label: '최종 결과', fill: 'rgba(197,134,192,.18)', stroke: '#c586c0' }
    ];
    refs.legend.innerHTML = items.map((item) => `<div class="leg"><div class="leg-c" style="background:${item.fill};border-color:${item.stroke}"></div>${item.label}</div>`).join('');
  }

  function renderTabs() {
    refs.tabs.innerHTML = [
      `<button class="tab-btn ${mode === 'bottom' ? 'active' : ''}" data-mode="bottom" type="button">ZeroOneKnapsack / Bottom-Up</button>`,
      `<button class="tab-btn ${mode === 'recur' ? 'active' : ''}" data-mode="recur" type="button">RecurZeroOneKnapsack / 재귀</button>`
    ].join('');
    refs.tabs.querySelectorAll('button').forEach((button) => {
      button.addEventListener('click', () => {
        stopAuto();
        mode = button.dataset.mode;
        steps = stepsByMode[mode];
        current = 0;
        renderTabs();
        renderStep();
      });
    });
  }

  function renderStep() {
    const step = steps[current];
    refs.counter.textContent = `Step ${current + 1} / ${steps.length}`;
    refs.desc.innerHTML = `<div class="desc-main">${esc(step.desc)}</div><div class="desc-formula">${step.formula}</div>`;
    refs.primaryTitle.textContent = mode === 'recur' ? 'Recursive Call Tree / 재귀 호출 트리' : 'DP Tables / 실제 자료구조 table[w][n], items[w][n]';
    refs.secondaryTitle.textContent = mode === 'recur' ? 'Call Stack & Trace / 호출 스택과 흐름' : 'items[w][n] / 아이템 선택 벡터';
    refs.secondaryBox.style.display = mode === 'recur' ? '' : 'none';
    renderItems(step);
    renderMeta(step);
    if (mode === 'recur') {
      renderTree(step);
      renderRecursiveDetails(step);
    } else {
      renderBottom(step);
    }
    renderCode(step);
    refs.progress.style.width = `${steps.length <= 1 ? 100 : (current / (steps.length - 1)) * 100}%`;
    refs.prev.disabled = current === 0;
    refs.reset.disabled = current === 0;
    refs.next.disabled = current === steps.length - 1;
    refs.last.disabled = current === steps.length - 1;
  }

  function setStep(index) {
    current = Math.max(0, Math.min(steps.length - 1, index));
    renderStep();
  }

  function stopAuto() {
    if (timer) clearInterval(timer);
    timer = null;
    refs.auto.textContent = 'Play';
  }

  function toggleAuto() {
    if (timer) {
      stopAuto();
      return;
    }
    refs.auto.textContent = 'Pause';
    timer = setInterval(() => {
      if (current >= steps.length - 1) {
        stopAuto();
        return;
      }
      setStep(current + 1);
    }, 550);
  }

  refs.reset.addEventListener('click', () => setStep(0));
  refs.prev.addEventListener('click', () => setStep(current - 1));
  refs.next.addEventListener('click', () => setStep(current + 1));
  refs.last.addEventListener('click', () => setStep(steps.length - 1));
  refs.auto.addEventListener('click', toggleAuto);
  document.addEventListener('keydown', (event) => {
    if (event.target && ['INPUT', 'TEXTAREA', 'SELECT'].includes(event.target.tagName)) return;
    if (event.code === 'ArrowRight') setStep(current + 1);
    if (event.code === 'ArrowLeft') setStep(current - 1);
    if (event.code === 'Home') setStep(0);
    if (event.code === 'End') setStep(steps.length - 1);
    if (event.code === 'Space') {
      event.preventDefault();
      toggleAuto();
    }
  });

  renderLegend();
  renderTabs();
  renderStep();
})();
</script>
<script src="../shared/viewer-controls.js"></script>
</body>
</html>
